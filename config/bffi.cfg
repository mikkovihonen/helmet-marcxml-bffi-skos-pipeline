# config/bffi.cfg
#
# Skosify configuration for the BFFI canonical graph. Used by
# `bffi-pipeline skosify` (M10) when invoking
# `skosify.skosify(canonical.ttl, overlay/bffi-skos-overlay.ttl, **config)`.
#
# Companion to docs/marcxml-to-bffi-skosmos-pipeline.md § 5.
#
# The committed approach is overlay-plus-inference: the [types] section
# stays empty, and we let Skosify's RDFS pass dual-type every
# bffi:Work / bffi:Expression as skos:Concept and lift
# bffi:hasExpression to skos:narrower. New BFFI subclasses absorb
# without a config change — only the overlay file gets a new line.

[namespaces]
skos  = http://www.w3.org/2004/02/skos/core#
skosx = http://purl.org/iso25964/skos-thes#
bf    = http://id.loc.gov/ontologies/bibframe/
bflc  = http://id.loc.gov/ontologies/bflc/
bffi  = http://urn.fi/URN:NBN:fi:schema:bffi:
dct   = http://purl.org/dc/terms/

[options]
# RDFS subclass + subproperty inference. Dual-types every
# bffi:Work / bffi:Expression as skos:Concept (and lifts
# bffi:hasExpression to skos:narrower) WITHOUT destroying the BFFI types.
infer = on

namespace = http://urn.fi/URN:NBN:fi:bib:work:
label = Finnish Authority Works and Expressions
default_language = fi
preflabel_policy = shortest

mark_top_concepts = true
narrower = true
keep_related = true
break_cycles = true

# Don't strip BFFI types or non-SKOS predicates from the canonical graph;
# the AdminMetadata block + provenance back-links must survive Skosify.
cleanup_classes = false
cleanup_properties = false
cleanup_unreachable = false

[types]
# Empty — relying on inference instead. Adding entries here would
# DESTRUCTIVELY rewrite source classes; we want to preserve bffi:Work
# / bffi:Expression alongside skos:Concept.

[literals]
# Empty — M3 already lifts bf:mainTitle → skos:prefLabel via the
# bf_to_bffi_work.rq CONSTRUCT, so the canonical Turtle never carries
# bf:mainTitle. (Python's ConfigParser uses ':' as a delimiter by
# default which makes the spec example's `bf:mainTitle = skos:prefLabel`
# unparseable here, but it's also unneeded.)

[relations]
# Empty — bffi:hasExpression / bffi:expressionOf are lifted via inference.
