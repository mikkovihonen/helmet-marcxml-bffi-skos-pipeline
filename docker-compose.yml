# Fuseki + Skosmos for the BFFI pipeline.
#
# Both containers build from the Skosmos v3.2 submodule under
# `third_party/Skosmos`. NatLibFi's Skosmos doesn't publish a Docker
# image; the same submodule's `dockerfiles/jena-fuseki2-docker/`
# Dockerfile is the canonical Fuseki build (downloads the official
# Apache Jena Fuseki JAR at build time). JENA_VERSION is pinned to
# the value Skosmos 3.2 commits to in its own docker-compose.yml.
#
# Apache Jena 5.4.0 / Skosmos 3.2 — keep these two in lock-step;
# changing one without the other risks quiet incompatibilities in
# the SPARQL `text:query` predicate or in the Skosmos REST shape.

services:
  fuseki:
    build:
      context: ./third_party/Skosmos/dockerfiles/jena-fuseki2-docker
      dockerfile: Dockerfile
      args:
        JENA_VERSION: 5.4.0
    image: bffi-fuseki:5.4.0
    container_name: bffi-fuseki
    command: --config=/fuseki/skosmos.ttl
    ports:
      - "3030:3030"
    environment:
      JAVA_OPTIONS: -Xmx4g -Xms1g
    volumes:
      # Fuseki dataset config (TDB2+text+unionDefaultGraph) creating
      # the `bffi` service. Mirrors the structure of Skosmos's
      # bundled `dockerfiles/config/skosmos.ttl`, renamed.
      - ./config/fuseki-config.ttl:/fuseki/skosmos.ttl:ro
      - fuseki-data:/fuseki/databases
    user: "fuseki:fuseki"
    restart: unless-stopped

  skosmos:
    build:
      context: ./third_party/Skosmos
      dockerfile: dockerfiles/Dockerfile.ubuntu
    image: bffi-skosmos:3.2
    container_name: bffi-skosmos
    ports:
      - "9090:80"
    depends_on:
      - fuseki
    volumes:
      # M11: vocabulary config per docs/archived/marcxml-to-bffi-skosmos-pipeline.md § 4.
      # The container reads /var/www/html/config.ttl on startup.
      - ./config/skosmos-config.ttl:/var/www/html/config.ttl:ro
    restart: unless-stopped

  # P-11 Phase D: local observability stack. Scrapes the
  # ``bffi-pipeline serve-metrics`` exporter running on the host
  # (Prometheus reaches it via ``host.docker.internal``) and renders
  # the bundled Grafana dashboard. All local; no outbound telemetry.
  # Start / stop via ``make observability-up`` / ``make observability-down``.
  #
  # Cross-runtime note: ``host.docker.internal`` resolves automatically
  # on Docker Desktop (macOS / Windows) and on Podman 4.5+ (which
  # provides it as a built-in alias alongside its native
  # ``host.containers.internal``). Linux-Docker operators must add
  # ``extra_hosts: ["host.docker.internal:host-gateway"]`` via a local
  # ``docker-compose.override.yml`` — the line is intentionally **not**
  # in the committed file because Podman rejects ``host-gateway`` as a
  # special value and fails to start the container.
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: bffi-prometheus
    # No host port mapping — Prometheus is reachable only via the Caddy
    # reverse proxy at http://localhost:8080/prometheus/. The internal
    # 9090 stays for the Caddy → Prometheus hop inside the Docker
    # network; ``host.docker.internal:9100`` for the scrape target is
    # unaffected (Prometheus initiates that connection itself).
    # P-32 Phase G: --web.enable-admin-api unlocks the
    # /api/v1/admin/tsdb/delete_series endpoint that
    # ``bffi-pipeline runs prune --apply --reset-prometheus`` calls.
    # --web.route-prefix lets Prometheus serve under /prometheus/ so
    # the reverse-proxy paths don't require Caddy rewrites; the
    # external-url makes generated links (redirects, in-UI URLs)
    # point at the public entry point.
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-admin-api"
      - "--web.external-url=http://localhost:8080/prometheus/"
      - "--web.route-prefix=/prometheus/"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    profiles: ["observability"]  # Excluded from the default ``up`` set

  grafana:
    image: grafana/grafana:11.4.0
    container_name: bffi-grafana
    # No host port mapping — Grafana is reachable only via the Caddy
    # reverse proxy at http://localhost:8080/grafana/. GF_SERVER_*
    # env vars make Grafana serve from the /grafana sub-path
    # correctly (asset URLs, dashboard links, OAuth redirects all
    # respect the prefix).
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SERVER_ROOT_URL: "http://localhost:8080/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles: ["observability"]

  # Caddy reverse-proxy: the single operator-facing entry point for the
  # observability stack. Routes:
  #   /grafana/*    → Grafana (UI + dashboard API)
  #   /prometheus/* → Prometheus (PromQL + admin API)
  #   /files/*      → static file server over ./runs/ (cataloguer TSVs,
  #                   export tarballs, per-record artifacts)
  #   /             → 301 → /grafana/ (default landing)
  #
  # Bound to 127.0.0.1:8080 only — never exposed externally. The bundled
  # Caddyfile carries no auth (Grafana's own anonymous-Viewer model
  # provides the read-only access tier; Prometheus + the file browser
  # have no auth either, mirroring the existing local-only stance).
  caddy:
    image: caddy:2-alpine
    container_name: bffi-caddy
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./runs:/srv:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - grafana
      - prometheus
    restart: unless-stopped
    profiles: ["observability"]

volumes:
  fuseki-data:
  prometheus-data:
  grafana-data:
  caddy-data:
  caddy-config:
