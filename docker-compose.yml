# Fuseki + Skosmos for the BFFI pipeline.
# Fuseki is pinned per docs/ci-strategy.md.
# Skosmos pinned to 3.2; config/skosmos-config.ttl lands in M11.

services:
  fuseki:
    image: stain/jena-fuseki:5.0.0
    container_name: bffi-fuseki
    ports:
      - "3030:3030"
    environment:
      ADMIN_PASSWORD: admin
      FUSEKI_DATASET_1: bffi
      JVM_ARGS: -Xmx4g
    volumes:
      - fuseki-data:/fuseki
    restart: unless-stopped

  skosmos:
    image: ghcr.io/natlibfi/skosmos:3.2
    container_name: bffi-skosmos
    ports:
      - "9090:8080"
    depends_on:
      - fuseki
    environment:
      SPARQL_ENDPOINT: http://fuseki:3030/bffi/query
    volumes:
      # M11: vocabulary config per docs/marcxml-to-bffi-skosmos-pipeline.md § 4.
      # The container reads /var/www/html/config.ttl on startup.
      - ./config/skosmos-config.ttl:/var/www/html/config.ttl:ro
    restart: unless-stopped

volumes:
  fuseki-data:
